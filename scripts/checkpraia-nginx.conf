# ── CheckPraia Nginx - Production RPi3 (Internet-Exposed) ───────────────────
# SSL + Gzip + Rate Limiting + Security Headers + OCSP Stapling

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS (production) ───────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name _;

    root /home/pi/checkpraia/public;

    # ── SSL (Let's Encrypt) ─────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/checkpraia.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkpraia.pt/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (faster TLS handshakes for visitors)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/checkpraia.pt/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://adservice.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://fcm.googleapis.com; frame-src https://pagead2.googlesyndication.com https://www.youtube.com;" always;

    # ── Gzip (reduz trafego 60-80%) ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        image/svg+xml;

    # ── Buffers (tuned for Pi3 1GB RAM) ─────────────────────────────────
    client_body_buffer_size 10k;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    # ── Timeouts ────────────────────────────────────────────────────────
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # ── Open file cache (reduz syscalls no SD card) ──────────────────────
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Rate limiting (defined in snippets/rate-limit.conf) ─────────────
    limit_req zone=general burst=20 nodelay;

    # ── Laravel routing ─────────────────────────────────────────────────
    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Auth endpoints: stricter rate limit ─────────────────────────────
    location ~ ^/(login|register|password|admin) {
        limit_req zone=auth burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;

    location = /429.html {
        root /home/pi/checkpraia/public;
        internal;
    }
    location = /50x.html {
        root /home/pi/checkpraia/public;
        internal;
    }

    # ── PHP-FPM ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Deny dotfiles ───────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ── Static assets: aggressive cache (Vite fingerprinted) ────────────
    location ~* \.(?:css|js|woff2?|ttf|eot|ico|svg|webp|png|jpg|jpeg|gif)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

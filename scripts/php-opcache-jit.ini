; ── OPCache for CheckPraia on RPi3 ────────────────────────────────────────
; JIT DESATIVADO: instavel em ARM 32-bit (RPi3 ARMv7)
; fast_shutdown REMOVIDO: foi removido no PHP 8.0

opcache.enable=1
opcache.enable_cli=0

; Memory: conservador para RPi3 1GB RAM
opcache.memory_consumption=96

; Interned strings
opcache.interned_strings_buffer=12

; Max files: suficiente para Laravel + Filament
opcache.max_accelerated_files=20000

; Validar em prod (DESLIGADO para maxima performance no Cartao SD - Hard Production Mode)
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; ── JIT DESATIVADO (ARM 32-bit instavel) ─────────────────────────────────
opcache.jit=disable
opcache.jit_buffer_size=0

; Verbosity
opcache.log_verbosity=1

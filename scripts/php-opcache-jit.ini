; ── OPCache + JIT for CheckPraia on RPi3 ──────────────────────────────────
; Copy this file to /etc/php.d/10-opcache.ini (overwrite existing)

opcache.enable=1
opcache.enable_cli=0

; Memory: conservative for RPi3 1GB RAM (vendor ~120MB + app code)
; 128MB is the sweet spot — enough for all vendor files
opcache.memory_consumption=128

; Interned strings: 16MB catches more strings than 8MB
; Tiny memory cost, big perf win for Laravel's string-heavy codebase
opcache.interned_strings_buffer=16

; Max files: semi-prime just above typical Laravel project file count
opcache.max_accelerated_files=32531

; Validate timestamps in prod — safe for RPi3
; deploy.sh triggers USR2 to invalidate OPcache after deploy
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; ── JIT ──────────────────────────────────────────────────────────────────
; tracing JIT: best for PHP web workloads (30-50% faster than no JIT)
opcache.jit=tracing

; JIT buffer: 48MB is ideal for RPi3 — enough for this app's hot paths
; without eating too much of the 1GB RAM budget
opcache.jit_buffer_size=48M

; ── Performance tweaks ──────────────────────────────────────────────────
; Disable console logging (saves memory in CLI mode)
opcache.log_verbosity=0

; Fast shutdown: skip full graceful shutdown (faster FPM recycling)
opcache.fast_shutdown=1

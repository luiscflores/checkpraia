; ── OPCache + JIT for CheckPraia on RPI3 ──────────────────────────────────
; Copy this file to /etc/php.d/10-opcache.ini (overwrite existing)

opcache.enable=1
opcache.enable_cli=1

; Increase memory for the project (vendor is ~120MB + app code)
opcache.memory_consumption=256

; Interned strings buffer
opcache.interned_strings_buffer=16

; Max files = semi-prime just above typical Laravel project file count
opcache.max_accelerated_files=32531

; Safer: revalidate every 60s. Use `sudo systemctl reload php-fpm` for instant clear.
; For max perf, set to 0 AFTER deploy and restart PHP-FPM.
opcache.validate_timestamps=1
opcache.revalidate_freq=60

; ── JIT ──────────────────────────────────────────────────────────────────
; Enable tracing JIT (faster for CPU-bound code like predictions)
opcache.jit=tracing

; JIT buffer size (128MB for RPI3 with 4GB+ RAM)
opcache.jit_buffer_size=128M

; ── File cache ───────────────────────────────────────────────────────────
; Second-level file cache to survive SHM reset
opcache.file_cache=/tmp/php-opcache
opcache.file_cache_consistency_checks=0
